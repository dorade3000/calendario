<mat-form-field>
  <mat-label>Username</mat-label>
  <input [formControl]="usernameForm" type="text" matInput>
</mat-form-field>
<mat-form-field>
  <mat-label>Password</mat-label>
  <input [formControl]="passwordForm" type="password" matInput>
</mat-form-field>
<button (click)="onSignUpClick()" class="sign-in-button" mat-flat-button>Sign In</button>
