<div class="page-container">
  <div class="login-and-sign-up-container">
    <div class="login-container">
      <div class="headline-and-form-fields">
        <h2 class="headline">Login</h2>

        <mat-form-field class="login-field">
          <mat-label>Username</mat-label>
          <input type="text" matInput>
        </mat-form-field>
        <mat-form-field class="login-field">
          <mat-label>Password</mat-label>
          <input type="password" matInput>
        </mat-form-field>
      </div>
      <button mat-flat-button>Sign In</button>
    </div>
    <p class="sign-up-link">Don't have an account? <a href="/register">Sign up</a></p>
  </div>
</div>
